<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dino Lunch</title>
    <meta name="theme-color" content="#bef264">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Dino Lunch">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" href="data:,">
    <link rel="manifest" href="/dino-runner/site.webmanifest">
    <link rel="apple-touch-icon" href="/dino-runner/icons/dino-lunch-180.png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="game-panel" aria-label="Dino Lunch game">
        <nav class="game-nav" aria-label="Games">
          <a class="game-link" href="/" aria-label="Play snake game">
            <span class="game-link-icon snake-icon"></span>
            <span>
              <strong>Snake Game</strong>
              <small>Eat dinos</small>
            </span>
          </a>
          <a class="game-link" href="/dino-runner/" aria-label="Play dinosaur lunch game">
            <span class="game-link-icon dino-launch-icon"></span>
            <span>
              <strong>Dino Game</strong>
              <small>Eat lunch</small>
            </span>
          </a>
          <a class="game-link" href="/cat-catcher/" aria-label="Play cat game">
            <span class="game-link-icon cat-launch-icon"></span>
            <span>
              <strong>Cat Game</strong>
              <small>Catch mice</small>
            </span>
          </a>
        </nav>

        <div class="topbar">
          <div>
            <h1>Dino Lunch</h1>
            <p>Pick a dino, then eat the right snacks.</p>
          </div>
          <div class="scoreboard" aria-live="polite">
            <span>Score</span>
            <strong id="score">0</strong>
          </div>
        </div>

        <div class="dino-picker" aria-label="Choose dinosaur">
          <button class="dino-option active" type="button" data-dino="trex">
            <span class="dino-icon trex"></span>
            <span>T-Rex</span>
          </button>
          <button class="dino-option" type="button" data-dino="triceratops">
            <span class="dino-icon triceratops"></span>
            <span>Trike</span>
          </button>
          <button class="dino-option" type="button" data-dino="stegosaurus">
            <span class="dino-icon stegosaurus"></span>
            <span>Stego</span>
          </button>
          <button class="dino-option" type="button" data-dino="bronto">
            <span class="dino-icon bronto"></span>
            <span>Bronto</span>
          </button>
        </div>

        <canvas id="game" width="720" height="720" aria-label="Dino game board"></canvas>

        <div class="controls">
          <button id="restart" type="button">Restart</button>
          <p id="status">Touch and hold where your dino should go.</p>
        </div>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
