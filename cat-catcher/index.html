<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mouse Catcher</title>
    <meta name="theme-color" content="#fb7185">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Mouse Catcher">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" href="data:,">
    <link rel="manifest" href="/cat-catcher/site.webmanifest">
    <link rel="apple-touch-icon" href="/cat-catcher/icons/mouse-catcher-180.png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="game-panel" aria-label="Mouse Catcher game">
        <nav class="game-nav" aria-label="Games">
          <a class="game-link" href="/" aria-label="Play snake game">
            <span class="game-link-icon snake-icon"></span>
            <span>
              <strong>Snake Game</strong>
              <small>Eat dinos</small>
            </span>
          </a>
          <a class="game-link" href="/dino-runner/" aria-label="Play dinosaur lunch game">
            <span class="game-link-icon dino-launch-icon"></span>
            <span>
              <strong>Dino Game</strong>
              <small>Eat lunch</small>
            </span>
          </a>
          <a class="game-link" href="/cat-catcher/" aria-label="Play mouse catcher game">
            <span class="game-link-icon cat-launch-icon"></span>
            <span>
              <strong>Mouse Catcher</strong>
              <small>Catch mice</small>
            </span>
          </a>
        </nav>

        <div class="topbar">
          <div>
            <h1>Mouse Catcher</h1>
            <p>Touch where the cat should run and catch the mice.</p>
          </div>
          <div class="scoreboard" aria-live="polite">
            <span>Mice</span>
            <strong id="score">0</strong>
          </div>
        </div>

        <canvas id="game" width="720" height="720" aria-label="Cat game board"></canvas>

        <div class="controls">
          <button id="restart" type="button">Restart</button>
          <p id="status">Touch and hold where your cat should go.</p>
        </div>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
